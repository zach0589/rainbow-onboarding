<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Your Consultation | Rainbow Restoration + Spot On Solutions</title>
  <style>
    :root {
      --rbw-navy: #002B5C;
      --rbw-red: #C8102E;
      --rbw-blue: #0057A0;
      --white: #ffffff;
      --off-white: #f5f7fa;
      --text: #2c3e50;
      --text-light: #5a6a7a;
      --border: #dce3eb;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
      background: var(--off-white);
      line-height: 1.6;
    }

    /* ── Header ── */
    .header {
      background: var(--white);
      border-bottom: 3px solid var(--rbw-red);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .header-logo { display: flex; align-items: center; gap: 0.75rem; }
    .header-logo img { height: 52px; width: auto; }
    .header-divider { width: 2px; height: 40px; background: var(--border); }
    .header-tag {
      font-size: 0.8rem;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    /* ── Booking Section ── */
    .booking-section {
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1rem 1rem;
      text-align: center;
    }
    .booking-section h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--rbw-navy);
      margin-bottom: 0.35rem;
    }
    .booking-section p {
      color: var(--text-light);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    /* ── HubSpot Embed ── */
    .meetings-iframe-container {
      min-height: 650px;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.82rem;
      color: var(--text-light);
      border-top: 1px solid var(--border);
      background: var(--white);
    }
    .footer a { color: var(--rbw-navy); text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
    .footer-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 0.75rem;
    }
    .footer-logos img { height: 48px; width: auto; }

    @media (max-width: 720px) {
      .header { gap: 1rem; padding: 0.75rem 1rem; }
      .header-logo img { height: 40px; }
      .booking-section h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <img src="https://www.neighborly.com/us/en-us/_assets/brand-config-logos/rainbow-restoration-new-r-logo-588x336.webp" alt="Rainbow Restoration">
    </div>
    <div class="header-divider"></div>
    <div class="header-logo">
      <img src="https://spotonsolutions.com/wp-content/uploads/2023/02/SOSLogo-2-1.png" alt="Spot On Solutions">
    </div>
    <span class="header-tag">Digital Marketing Program</span>
  </header>

  <!-- Booking -->
  <div class="booking-section">
    <h1>Pick a time for your consultation</h1>
    <p>Choose a time that works and we'll walk through your marketing together.</p>
  </div>

  <!-- HubSpot Meeting Embed -->
  <div class="meetings-iframe-container" data-src="https://meetings-na2.hubspot.com/zteichert/rainbow-marketing-consultation?embed=true"></div>
  <script type="text/javascript" src="https://static.hsappstatic.net/MeetingsEmbed/ex/MeetingsEmbedCode.js"></script>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-logos">
      <img src="https://spotonsolutions.com/wp-content/uploads/2023/02/SOSLogo-2-1.png" alt="Spot On Solutions">
    </div>
    <div class="footer-logos" style="margin-top: 0.75rem;">
      <img src="assets/google-premier-partner.png" alt="Google Premier Partner 2026">
      <img src="assets/forbes-agency-council.png" alt="Forbes Agency Council">
      <img src="assets/ria-vendor-member.jpg" alt="RIA Vendor Member">
    </div>
    <p>A digital marketing program by <a href="https://spotonsolutions.com">Spot On Solutions</a> for <a href="#">Rainbow Restoration</a> franchisees.</p>
    <p style="margin-top: 0.25rem;">&copy; 2026 Spot On Solutions. All rights reserved.</p>
  </footer>

</body>
</html>
